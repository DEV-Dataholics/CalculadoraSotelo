name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (PHP + PHPUnit)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: sotelo_payroll_test
          MYSQL_USER: sotelo
          MYSQL_PASSWORD: sotelopass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, intl, mysqli, xml, json
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Configure environment
        run: |
          cp env .env
          sed -i 's/# CI_ENVIRONMENT = production/CI_ENVIRONMENT = testing/' .env
          sed -i 's/# database.tests.hostname = localhost/database.tests.hostname = 127.0.0.1/' .env
          sed -i 's/# database.tests.database = ci4_test/database.tests.database = sotelo_payroll_test/' .env
          sed -i 's/# database.tests.username = root/database.tests.username = sotelo/' .env
          sed -i 's/# database.tests.password = root/database.tests.password = sotelopass/' .env
          sed -i 's/# database.tests.DBDriver = MySQLi/database.tests.DBDriver = MySQLi/' .env
          sed -i 's/# database.tests.port = 3306/database.tests.port = 3306/' .env
          echo 'JWT_SECRET=ci-test-jwt-secret-32chars-min' >> .env

      - name: Run migrations (test DB)
        run: php spark migrate --env testing

      - name: Run PHPUnit
        run: composer test

  frontend:
    name: Frontend (Node + ESLint + Build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080
